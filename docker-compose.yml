version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledgr-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=sqlite:////app/backend/ledgr.db
      - LEDGR_MASTER_PASSWORD=ledgrpass
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ledgr-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevent host node_modules from overriding container dependencies
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    stdin_open: true
    tty: true
